<div id="top" class="header">
    <div class="left">
        <div id="hlo">Hello, Welcome</div>
        <div id="simpleUsage"></div>
        <div id="simpleUsage2"></div>
        <a><button class="btn">Contact us</button></a>
    </div>
    <div class="right">
        <div class="imgp"><img src="images/photo.png"></div>
    </div>
</div>
<style>
/* Base styles */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px;
  background-color: #f8f9fa;
}

/* Styling for the left section */
.left {
  display: flex;
  flex-direction: column;
  justify-content: center;
}

#hlo {
  font-size: 24px;
  margin-bottom: 10px;
}

#simpleUsage,
#simpleUsage2 {
  margin-bottom: 10px;
}

.btn {
  padding: 10px 20px;
  background-color: #007bff;
  color: #fff;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

/* Styling for the right section */
.right {
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Ensuring the image container is styled properly */
.imgp {
  width: 350px;
  height: 350px;
  background-color: #3da5d9;
  margin: 50px auto;
  border-radius: 59% 41% 25% 75% / 31% 60% 35% 69%;
  display: flex;
  justify-content: center;
  align-items: end;
  overflow: hidden;
}

.imgp img {
  height: 100%;
}

/* Media query for mobile devices */
@media (max-width: 600px) {
  .header {
    flex-direction: column;
    align-items: flex-start;
  }

  .left {
    width: 100%;
    align-items: center;
  }

  .right {
    width: 100%;
    margin-top: 20px;
    display: flex;
    justify-content: center;
  }

  .imgp {
    width: 250px;
    height: 250px;
    margin: 20px auto;
  }
}

@media (max-width: 400px) {
  #hlo {
    font-size: 20px;
  }

  .btn {
    padding: 8px 16px;
    font-size: 14px;
  }

  .imgp {
    width: 150px;
    height: 150px;
  }
}
</style>
